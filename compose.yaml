name: ${COMPOSE_PROJECT_NAME:-on-click}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_BASE_URL: ${AI_BASE_URL:-http://ai:8000}
      AI_INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY:-local-mock-key}
      MEDIA_STORAGE_DIRECTORY: /data/media
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:8080}
      INSTAGRAM_PROVIDER: ${INSTAGRAM_PROVIDER:-mock}
      INSTAGRAM_CLIENT_ID: ${INSTAGRAM_CLIENT_ID:-mock-client-id}
      INSTAGRAM_CLIENT_SECRET: ${INSTAGRAM_CLIENT_SECRET:-mock-client-secret}
      INSTAGRAM_OAUTH_CALLBACK_URL: ${INSTAGRAM_OAUTH_CALLBACK_URL:-http://localhost:8080/integrations/instagram/callback}
      INSTAGRAM_FRONTEND_REDIRECT_URL: ${INSTAGRAM_FRONTEND_REDIRECT_URL:-http://localhost:5173/settings/integrations/instagram}
      INSTAGRAM_TOKEN_ENCRYPTION_KEY: ${INSTAGRAM_TOKEN_ENCRYPTION_KEY:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - media-data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
    init: true

volumes:
  postgres-data:
  media-data:
