name: ${COMPOSE_PROJECT_NAME:-on-click}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_CONNECT_TIMEOUT: ${AI_CONNECT_TIMEOUT:-PT2S}
      AI_READ_TIMEOUT: ${AI_READ_TIMEOUT:-PT60S}
      AI_MAX_ATTEMPTS: ${AI_MAX_ATTEMPTS:-2}
      AI_INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY:-}
      AI_CLOSING_SALES_PATH: ${AI_CLOSING_SALES_PATH:-/ai/forecasts/closing-sales}
      AI_TOMORROW_VISITORS_PATH: ${AI_TOMORROW_VISITORS_PATH:-/ai/forecasts/tomorrow-visitors}
      AI_DAILY_CONSULTING_PATH: ${AI_DAILY_CONSULTING_PATH:-/ai/consultings/daily}
      AI_CHAT_PATH: ${AI_CHAT_PATH:-/ai/chat}
      AI_MARKETING_PATH: ${AI_MARKETING_PATH:-/ai/marketings/copy}
      AI_INSTAGRAM_PUBLISH_PATH: ${AI_INSTAGRAM_PUBLISH_PATH:-/ai/marketings/{marketingId}/publish/instagram}
      CHAT_MAX_ATTEMPTS: ${CHAT_MAX_ATTEMPTS:-3}
      CHAT_LEASE_DURATION: ${CHAT_LEASE_DURATION:-PT4M}
      CHAT_RETRY_DELAY: ${CHAT_RETRY_DELAY:-PT10S}
      CHAT_RECOVERY_BATCH_SIZE: ${CHAT_RECOVERY_BATCH_SIZE:-50}
      CONSULTING_MAX_ATTEMPTS: ${CONSULTING_MAX_ATTEMPTS:-3}
      CONSULTING_RETRY_DELAY: ${CONSULTING_RETRY_DELAY:-PT5M}
      CONSULTING_LEASE_DURATION: ${CONSULTING_LEASE_DURATION:-PT4M}
      MEDIA_STORAGE_DIRECTORY: /data/media
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:8080}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - media-data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
    init: true

volumes:
  postgres-data:
  media-data:
