spring:
  application:
    name: on-click-be
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/onclick}
    username: ${DB_USERNAME:onclick}
    password: ${DB_PASSWORD:onclick}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 4
        max-size: 8

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-123456}
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:https://aaaaaa-ead.pages.dev,http://localhost:5173}"
  ai:
    provider: ${AI_PROVIDER:mock}
    http:
      base-url: ${AI_BASE_URL:http://localhost:8000}
      internal-api-key: ${AI_INTERNAL_API_KEY:}
      internal-api-key-header: ${AI_INTERNAL_API_KEY_HEADER:X-Internal-Api-Key}
      connect-timeout: ${AI_CONNECT_TIMEOUT:PT2S}
      read-timeout: ${AI_READ_TIMEOUT:PT10S}
      max-attempts: ${AI_MAX_ATTEMPTS:2}
      paths:
        closing-sales: ${AI_CLOSING_SALES_PATH:/ai/forecasts/closing-sales}
        tomorrow-visitors: ${AI_TOMORROW_VISITORS_PATH:/ai/forecasts/tomorrow-visitors}
        consulting: ${AI_CONSULTING_PATH:/ai/consultings}
        chat: ${AI_CHAT_PATH:/ai/chat}
        marketing: ${AI_MARKETING_PATH:/ai/marketing/generations}
  media:
    storage-directory: ${MEDIA_STORAGE_DIRECTORY:/tmp/on-click-media}
    public-base-url: ${MEDIA_PUBLIC_BASE_URL:http://localhost:8080}
    max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:10485760}
    orphan-retention: ${MEDIA_ORPHAN_RETENTION:PT24H}
    cleanup-interval: ${MEDIA_CLEANUP_INTERVAL:PT1H}
  consulting:
    enabled: ${CONSULTING_ENABLED:true}
    scheduler-delay: ${CONSULTING_SCHEDULER_DELAY:PT1M}
    initial-delay: ${CONSULTING_INITIAL_DELAY:PT10S}
    max-attempts: ${CONSULTING_MAX_ATTEMPTS:3}
    batch-size: ${CONSULTING_BATCH_SIZE:100}
    retry-delay: ${CONSULTING_RETRY_DELAY:PT5M}
    lease-duration: ${CONSULTING_LEASE_DURATION:PT2M}
  instagram:
    provider: ${INSTAGRAM_PROVIDER:mock}
    client-id: ${INSTAGRAM_CLIENT_ID:mock-client-id}
    client-secret: ${INSTAGRAM_CLIENT_SECRET:mock-client-secret}
    oauth-callback-url: ${INSTAGRAM_OAUTH_CALLBACK_URL:http://localhost:8080/integrations/instagram/callback}
    frontend-redirect-url: ${INSTAGRAM_FRONTEND_REDIRECT_URL:http://localhost:5173/settings/integrations/instagram}
    authorize-url: ${INSTAGRAM_AUTHORIZE_URL:https://www.instagram.com/oauth/authorize}
    token-url: ${INSTAGRAM_TOKEN_URL:https://api.instagram.com/oauth/access_token}
    graph-base-url: ${INSTAGRAM_GRAPH_BASE_URL:https://graph.instagram.com/v22.0}
    scopes: ${INSTAGRAM_SCOPES:instagram_business_basic,instagram_business_content_publish}
    token-encryption-key: ${INSTAGRAM_TOKEN_ENCRYPTION_KEY:}
    state-ttl: ${INSTAGRAM_STATE_TTL:PT10M}
    connect-timeout: ${INSTAGRAM_CONNECT_TIMEOUT:PT3S}
    read-timeout: ${INSTAGRAM_READ_TIMEOUT:PT15S}
    refresh-cron: ${INSTAGRAM_REFRESH_CRON:0 0 3 * * *}
    state-cleanup-cron: ${INSTAGRAM_STATE_CLEANUP_CRON:0 30 3 * * *}
    publish-recovery-interval: ${INSTAGRAM_PUBLISH_RECOVERY_INTERVAL:PT1M}
