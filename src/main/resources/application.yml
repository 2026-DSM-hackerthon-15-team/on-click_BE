spring:
  application:
    name: on-click-be
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/onclick}
    username: ${DB_USERNAME:onclick}
    password: ${DB_PASSWORD:onclick}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-123456}
  ai:
    provider: ${AI_PROVIDER:mock}
