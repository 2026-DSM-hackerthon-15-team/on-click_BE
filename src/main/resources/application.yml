spring:
  application:
    name: on-click-be
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/onclick}
    username: ${DB_USERNAME:onclick}
    password: ${DB_PASSWORD:onclick}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 4
        max-size: 8

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-123456}
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:https://aaaaaa-ead.pages.dev,http://localhost:5173}"
  ai:
    provider: ${AI_PROVIDER:mock}
    http:
      base-url: ${AI_BASE_URL:http://localhost:8000}
      connect-timeout: ${AI_CONNECT_TIMEOUT:PT2S}
      read-timeout: ${AI_READ_TIMEOUT:PT60S}
      max-attempts: ${AI_MAX_ATTEMPTS:2}
      internal-api-key: ${AI_INTERNAL_API_KEY:}
      paths:
        closing-sales: ${AI_CLOSING_SALES_PATH:/ai/forecasts/closing-sales}
        tomorrow-visitors: ${AI_TOMORROW_VISITORS_PATH:/ai/forecasts/tomorrow-visitors}
        daily-consulting: ${AI_DAILY_CONSULTING_PATH:/ai/consultings/daily}
        chat: ${AI_CHAT_PATH:/ai/chat}
        marketing: ${AI_MARKETING_PATH:/ai/marketings/copy}
        instagram-publish: ${AI_INSTAGRAM_PUBLISH_PATH:/ai/marketings/{marketingId}/publish/instagram}
  media:
    storage-directory: ${MEDIA_STORAGE_DIRECTORY:/tmp/on-click-media}
    public-base-url: ${MEDIA_PUBLIC_BASE_URL:http://localhost:8080}
    max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:10485760}
    orphan-retention: ${MEDIA_ORPHAN_RETENTION:PT24H}
    cleanup-interval: ${MEDIA_CLEANUP_INTERVAL:PT1H}
  chat:
    processing:
      max-attempts: ${CHAT_MAX_ATTEMPTS:3}
      lease-duration: ${CHAT_LEASE_DURATION:PT4M}
      retry-delay: ${CHAT_RETRY_DELAY:PT10S}
      recovery-batch-size: ${CHAT_RECOVERY_BATCH_SIZE:50}
  consulting:
    enabled: ${CONSULTING_ENABLED:true}
    scheduler-delay: ${CONSULTING_SCHEDULER_DELAY:PT1M}
    initial-delay: ${CONSULTING_INITIAL_DELAY:PT10S}
    max-attempts: ${CONSULTING_MAX_ATTEMPTS:3}
    batch-size: ${CONSULTING_BATCH_SIZE:100}
    retry-delay: ${CONSULTING_RETRY_DELAY:PT5M}
    lease-duration: ${CONSULTING_LEASE_DURATION:PT4M}
